name: OpenHR CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: openhr_test
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore RegionHR.sln

      - name: Build
        run: dotnet build RegionHR.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test RegionHR.sln --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__RegionHR: "Host=localhost;Port=54322;Database=openhr_test;Username=postgres;Password=postgres"

      - name: Publish
        run: dotnet publish src/Web/RegionHR.Web.csproj --no-build --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openhr-web
          path: ./publish
